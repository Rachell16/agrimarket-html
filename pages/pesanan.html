<!DOCTYPE html>
<html lang="id">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Pesanan Saya — AgriMarket</title><link rel="stylesheet" href="../css/style.css"></head>
<body>
<div id="navbar"></div>
<div class="container"><div style="padding:32px 0">
  <h1 style="font-family:var(--font-head);font-size:28px;font-weight:700;margin-bottom:24px">📦 Pesanan Saya</h1>
  <div id="pesanan-list"></div>
</div></div>
<div id="footer"></div>
<script src="../js/app.js"></script><script src="../js/components.js"></script>
<script>
  initComponents('../');
  const orders = JSON.parse(localStorage.getItem('agrimarket_orders') || '[]');
  const el = document.getElementById('pesanan-list');
  if (!orders.length) {
    el.innerHTML = `<div class="empty-state"><div class="icon">📦</div><p style="margin-bottom:16px">Belum ada pesanan.</p><a href="katalog.html" class="btn btn-green">Mulai Belanja</a></div>`;
  } else {
    el.innerHTML = orders.map(o => `
      <div class="card card-pad mb-12">
        <div class="flex-between mb-12">
          <div><div style="font-size:13px;font-weight:700;color:var(--g700)">${o.kode}</div><div class="text-muted text-sm">${o.tanggal}</div></div>
          <span class="badge badge-green">Diproses</span>
        </div>
        <div class="flex-between"><span class="text-muted text-sm">${o.items} item</span><div style="font-size:16px;font-weight:700;color:var(--g700)">${rupiah(o.total)}</div></div>
      </div>`).join('');
  }
</script>
</body></html>
