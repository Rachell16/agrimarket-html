<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Keranjang Belanja — AgriMarket</title>
<link rel="stylesheet" href="../css/style.css">
</head>
<body>
<div id="navbar"></div>
<div class="container">
  <div style="padding:32px 0">
    <h1 style="font-family:var(--font-head);font-size:28px;font-weight:700;margin-bottom:24px">
      🛒 Keranjang Belanja <span class="text-muted" style="font-size:16px;font-weight:400" id="item-count"></span>
    </h1>
    <div class="cart-layout" id="cart-layout">
      <div id="cart-items"></div>
      <div class="sum-box" id="sum-box">
        <div style="font-size:16px;font-weight:700;margin-bottom:20px">Ringkasan Pesanan</div>
        <form onsubmit="checkout(event)">
          <div class="form-group">
            <label class="form-label">Alamat Pengiriman</label>
            <textarea class="form-input" name="alamat" rows="3" placeholder="Masukkan alamat lengkap..." required></textarea>
          </div>
          <div class="form-group">
            <label class="form-label">Opsi Pengiriman</label>
            <label class="ship-opt-label" style="display:flex;align-items:center;gap:12px;border:1.5px solid var(--g700);border-radius:10px;padding:12px;cursor:pointer;background:var(--g50);margin-bottom:8px">
              <input type="radio" name="pengiriman" value="pagi" checked onchange="updateOngkir(15000)">
              <div><div style="font-size:13px;font-weight:700">🌅 Pengiriman Pagi</div><div class="text-muted text-sm">Tiba sebelum 09.00 WIB · + Rp 15.000</div></div>
            </label>
            <label class="ship-opt-label" style="display:flex;align-items:center;gap:12px;border:1.5px solid var(--border);border-radius:10px;padding:12px;cursor:pointer">
              <input type="radio" name="pengiriman" value="siang" onchange="updateOngkir(10000)">
              <div><div style="font-size:13px;font-weight:700">☀️ Pengiriman Siang</div><div class="text-muted text-sm">Tiba 10.00–14.00 WIB · + Rp 10.000</div></div>
            </label>
          </div>
          <div class="form-group">
            <label class="form-label">Metode Pembayaran</label>
            <select class="form-input form-select" name="metode">
              <option>💳 E-Wallet</option>
              <option>🏦 Transfer Bank</option>
              <option>📱 QRIS</option>
              <option>💰 COD</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Catatan (opsional)</label>
            <input class="form-input" type="text" placeholder="Pesan untuk penjual...">
          </div>
          <hr class="divider">
          <div class="sum-row"><span>Subtotal</span><span id="sum-sub">Rp 0</span></div>
          <div class="sum-row"><span>Ongkos kirim</span><span id="sum-ongkir">Rp 15.000</span></div>
          <div class="sum-row"><span>Diskon</span><span style="color:var(--g700)">− Rp 0</span></div>
          <div class="sum-total"><span>Total</span><span style="color:var(--g700)" id="sum-total">Rp 0</span></div>
          <button type="submit" class="btn btn-green w-full btn-lg mt-16">💳 Pesan Sekarang</button>
          <div class="text-center mt-8 text-sm text-muted">🔒 Transaksi aman & terenkripsi</div>
        </form>
      </div>
    </div>
  </div>
</div>
<div id="footer"></div>
<script src="../js/app.js"></script>
<script src="../js/components.js"></script>
<script>
  initComponents('../');
  document.getElementById('item-count').textContent = `(${cart.length} item)`;
  renderCart();
</script>
</body>
</html>
